<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>👑 WHOPPER BAR • ПЛАНШЕТ КЛИЕНТА</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: #2b1b0e;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tablet-container {
            max-width: 1200px;
            width: 100%;
            background: #f8f2e6;
            border-radius: 60px;
            padding: 30px;
            border: 5px solid #fec233;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            min-height: 800px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #d62323;
            color: white;
            padding: 25px 30px;
            border-radius: 50px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid #fec233;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .logo i {
            color: #fec233;
            font-size: 2.8rem;
        }

        .time {
            background: #2d2d2d;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 2rem;
            border: 2px solid #fec233;
        }

        .waiting-mode {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .waiting-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2d1d0c;
            text-align: center;
            margin: 20px 0 40px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .menu-item-card {
            background: white;
            border-radius: 30px;
            padding: 25px 20px;
            text-align: center;
            border: 3px solid #d8a76b;
            box-shadow: 0 8px 0 #b57c42;
            transition: 0.1s;
        }

        .menu-item-card i {
            font-size: 3rem;
            color: #c53a1f;
            margin-bottom: 15px;
        }

        .menu-item-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d1d0c;
            margin-bottom: 10px;
        }

        .menu-item-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: #c1411b;
        }

        .order-mode {
            display: none;
            flex: 1;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .order-header h2 {
            font-size: 2.5rem;
            color: #c53a1f;
        }

        .order-items {
            background: #fff2d7;
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 30px;
            border: 3px solid #ba6b3c;
            min-height: 400px;
        }

        .order-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid #cbad86;
            font-size: 1.8rem;
        }

        .order-item-row:last-child {
            border-bottom: none;
        }

        .item-name {
            font-weight: 600;
        }

        .item-quantity {
            background: #c1411b;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            margin: 0 20px;
        }

        .item-price {
            font-weight: 700;
            color: #c53a1f;
            min-width: 120px;
            text-align: right;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #312713;
            color: #fddc9c;
            padding: 25px 30px;
            border-radius: 50px;
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 20px;
        }

        .total-amount {
            background: #ebc87e;
            color: #2d1f0c;
            padding: 15px 40px;
            border-radius: 50px;
        }

        .order-number-mode {
            display: none;
            flex: 1;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .order-number-box {
            background: white;
            border-radius: 80px;
            padding: 60px;
            text-align: center;
            border: 8px solid #4CAF50;
            box-shadow: 0 20px 0 #2d6a2d;
            max-width: 700px;
            width: 100%;
        }

        .order-number-label {
            font-size: 2.5rem;
            color: #2d1d0c;
            margin-bottom: 30px;
        }

        .order-number-display {
            font-size: 8rem;
            font-weight: 900;
            color: #c53a1f;
            background: #fff2d7;
            padding: 40px;
            border-radius: 60px;
            margin: 30px 0;
            border: 3px solid #d8a76b;
        }

        .order-number-timer {
            font-size: 2rem;
            color: #666;
        }

        .order-number-timer i {
            color: #ff9800;
            margin-right: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .fade-in {
            animation: slideIn 0.5s ease-out;
        }

        .timer-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 30px;
            margin-top: 30px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: #4CAF50;
            width: 100%;
            transition: width 1s linear;
        }

        @media (max-width: 768px) {
            .tablet-container {
                padding: 15px;
            }
            
            .order-number-display {
                font-size: 5rem;
            }
            
            .order-item-row {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="tablet-container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <span>WHOPPER BAR</span>
            </div>
            <div class="time" id="liveTime">12:00:00</div>
        </div>

        <div id="waitingMode" class="waiting-mode">
            <div class="waiting-title">
                <i class="fas fa-utensils"></i> НАШЕ МЕНЮ
            </div>
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <div id="orderMode" class="order-mode">
            <div class="order-header">
                <h2><i class="fas fa-shopping-basket"></i> ТЕКУЩИЙ ЗАКАЗ</h2>
            </div>
            <div class="order-items" id="orderItemsList"></div>
            <div class="order-total">
                <span>ИТОГО К ОПЛАТЕ:</span>
                <span class="total-amount" id="orderTotalAmount">0 ₽</span>
            </div>
        </div>

        <div id="orderNumberMode" class="order-number-mode">
            <div class="order-number-box fade-in">
                <div class="order-number-label">✅ ВАШ ЗАКАЗ ОФОРМЛЕН</div>
                <div class="order-number-display" id="orderNumberDisplay">1234</div>
                <div class="order-number-timer">
                    <i class="fas fa-clock"></i>
                    <span id="timerSeconds">10</span> сек
                </div>
                <div class="timer-bar">
                    <div class="timer-progress" id="timerProgress"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlZ5ZtyTXgtXxSXJAx1jOxwhTrzlHRJmo",
            authDomain: "bk-cashier.firebaseapp.com",
            databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bk-cashier",
            storageBucket: "bk-cashier.firebasestorage.app",
            messagingSenderId: "385000840969",
            appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const menuItems = [
            { id: 1, name: 'Воппер', price: 199, icon: 'fa-burger' },
            { id: 2, name: 'Чизбургер', price: 89, icon: 'fa-cheese' },
            { id: 3, name: 'Двойной Воппер', price: 329, icon: 'fa-burger' },
            { id: 4, name: 'Лонг Чикен', price: 219, icon: 'fa-drumstick-bite' },
            { id: 5, name: 'Стрипсы 3шт', price: 149, icon: 'fa-drumstick' },
            { id: 6, name: 'Наггетсы 6шт', price: 159, icon: 'fa-cubes' },
            { id: 7, name: 'Картофель фри', price: 119, icon: 'fa-french-fries' },
            { id: 8, name: 'Кола', price: 99, icon: 'fa-wine-bottle' },
            { id: 9, name: 'Морс', price: 109, icon: 'fa-mug-hot' },
            { id: 10, name: 'Пирожок', price: 89, icon: 'fa-cake-candles' },
            { id: 11, name: 'Двойной Чизбургер', price: 179, icon: 'fa-cheese' },
            { id: 12, name: 'Биг Спешиал', price: 299, icon: 'fa-burger' },
            { id: 13, name: 'Чикен Премьер', price: 249, icon: 'fa-drumstick-bite' },
            { id: 14, name: 'Роял Чизбургер', price: 199, icon: 'fa-cheese' },
            { id: 15, name: 'Бекон Бургер', price: 229, icon: 'fa-bacon' }
        ];

        let timerInterval = null;
        let timerSeconds = 10;

        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU');
            document.getElementById('liveTime').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            
            menuItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-item-card';
                card.innerHTML = `
                    <i class="fas ${item.icon}"></i>
                    <div class="menu-item-name">${item.name}</div>
                    <div class="menu-item-price">${item.price} ₽</div>
                `;
                grid.appendChild(card);
            });
        }

        function showWaitingMode() {
            document.getElementById('waitingMode').style.display = 'flex';
            document.getElementById('orderMode').style.display = 'none';
            document.getElementById('orderNumberMode').style.display = 'none';
        }

        function showOrderMode(order) {
            document.getElementById('waitingMode').style.display = 'none';
            document.getElementById('orderMode').style.display = 'block';
            document.getElementById('orderNumberMode').style.display = 'none';
            
            const orderList = document.getElementById('orderItemsList');
            let itemsHtml = '';
            let total = 0;
            
            order.items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                itemsHtml += `
                    <div class="order-item-row fade-in">
                        <span class="item-name">${item.name}</span>
                        <span class="item-quantity">x${item.quantity}</span>
                        <span class="item-price">${itemTotal} ₽</span>
                    </div>
                `;
            });
            
            orderList.innerHTML = itemsHtml;
            document.getElementById('orderTotalAmount').innerText = total + ' ₽';
        }

        function showOrderNumberMode(orderNum) {
            document.getElementById('waitingMode').style.display = 'none';
            document.getElementById('orderMode').style.display = 'none';
            document.getElementById('orderNumberMode').style.display = 'flex';
            
            document.getElementById('orderNumberDisplay').innerText = orderNum;
            
            timerSeconds = 10;
            document.getElementById('timerSeconds').innerText = timerSeconds;
            document.getElementById('timerProgress').style.width = '100%';
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                document.getElementById('timerSeconds').innerText = timerSeconds;
                document.getElementById('timerProgress').style.width = (timerSeconds * 10) + '%';
                
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    showWaitingMode();
                }
            }, 1000);
        }

        function setupFirebaseListener() {
            db.ref('currentOrder').on('value', (snapshot) => {
                const order = snapshot.val();
                if (order && order.items && order.items.length > 0) {
                    showOrderMode(order);
                } else {
                    showWaitingMode();
                }
            });

            db.ref('paidOrders').limitToLast(1).on('child_added', (snapshot) => {
                const order = snapshot.val();
                if (order && order.orderNum) {
                    showOrderNumberMode(order.orderNum);
                }
            });
        }

        renderMenu();
        setupFirebaseListener();
        showWaitingMode();
    </script>
</body>
</html>
