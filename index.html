<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>👑 BK КОРОНА • ЭКРАН ЗАКАЗОВ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: #2b1b0e;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .display-container {
            max-width: 1800px;
            width: 100%;
            background: #f8f2e6;
            border-radius: 60px;
            padding: 30px;
            border: 5px solid #fec233;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ШАПКА */
        .header {
            background: #d62323;
            color: white;
            padding: 25px 30px;
            border-radius: 50px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid #fec233;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .logo i {
            color: #fec233;
            font-size: 3rem;
        }

        .time {
            background: #2d2d2d;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 2rem;
            border: 2px solid #fec233;
        }

        /* ТРИ КОЛОНКИ */
        .columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 20px;
        }

        .column {
            background: #fef9ef;
            border-radius: 40px;
            padding: 25px;
            border: 3px dashed #d4a373;
            min-height: 600px;
        }

        .column-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            font-size: 2rem;
            font-weight: 800;
            color: #2d1d0c;
            padding-bottom: 20px;
            border-bottom: 3px dashed #d4a373;
        }

        .column-header i {
            color: #c53a1f;
            font-size: 2.2rem;
        }

        .badge {
            background: #c53a1f;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1.5rem;
            margin-left: 15px;
        }

        /* СЕТКА НОМЕРОВ */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }

        /* КАРТОЧКА НОМЕРА */
        .number-card {
            background: white;
            border-radius: 30px;
            padding: 20px 10px;
            text-align: center;
            border: 3px solid #ba6b3c;
            box-shadow: 0 6px 0 #8f542e;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .number-card.waiting {
            border-left: 10px solid #ff9800;
        }

        .number-card.ready {
            border-left: 10px solid #4CAF50;
        }

        .number-card.done {
            border-left: 10px solid #808080;
            opacity: 0.7;
        }

        .number-card.big {
            grid-column: span 2;
            padding: 30px 15px;
        }

        .order-number {
            font-size: 3rem;
            font-weight: 900;
            color: #c53a1f;
            line-height: 1;
            margin-bottom: 10px;
        }

        .client-name {
            font-size: 1.2rem;
            color: #2d1d0c;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .crowns {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #fec233;
            color: #2d1d0c;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 1rem;
        }

        .time-ago {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        /* СТАТУС БАР */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0 20px;
            padding: 20px;
            background: #fff2d7;
            border-radius: 50px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
        }

        .status-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .dot-waiting { background: #ff9800; }
        .dot-ready { background: #4CAF50; }
        .dot-done { background: #808080; }

        /* АНИМАЦИИ */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .number-card.new {
            animation: pulse 1s ease infinite;
            border-color: #fec233;
        }

        /* ПУСТЫЕ СОСТОЯНИЯ */
        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 1.5rem;
        }

        .empty-state i {
            font-size: 4rem;
            color: #cbad86;
            margin-bottom: 15px;
        }

        /* АДАПТАЦИЯ */
        @media (max-width: 1200px) {
            .columns {
                grid-template-columns: repeat(2, 1fr);
            }
            .order-number { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            .columns {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .logo { font-size: 2rem; }
            .time { font-size: 1.5rem; }
        }

        @media (min-width: 1600px) {
            .numbers-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .order-number { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
    <div class="display-container">
        <!-- ШАПКА -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-crown"></i>
                <span>BK КОРОНА • ЭКРАН ЗАКАЗОВ</span>
            </div>
            <div class="time" id="liveTime">12:00:00</div>
        </div>

        <!-- СТАТУС БАР -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot dot-waiting"></span>
                <span>Готовится</span>
            </div>
            <div class="status-item">
                <span class="status-dot dot-ready"></span>
                <span>Готов к выдаче</span>
            </div>
            <div class="status-item">
                <span class="status-dot dot-done"></span>
                <span>Выдан</span>
            </div>
        </div>

        <!-- ТРИ КОЛОНКИ -->
        <div class="columns">
            <!-- КОЛОНКА 1: ГОТОВИТСЯ -->
            <div class="column">
                <div class="column-header">
                    <i class="fas fa-clock"></i>
                    <span>ГОТОВИТСЯ</span>
                    <span class="badge" id="waitingCount">0</span>
                </div>
                <div class="numbers-grid" id="waitingNumbers"></div>
            </div>

            <!-- КОЛОНКА 2: ГОТОВО -->
            <div class="column">
                <div class="column-header">
                    <i class="fas fa-check-circle"></i>
                    <span>ГОТОВО</span>
                    <span class="badge" id="readyCount">0</span>
                </div>
                <div class="numbers-grid" id="readyNumbers"></div>
            </div>

            <!-- КОЛОНКА 3: ВЫДАНО (ИСТОРИЯ) -->
            <div class="column">
                <div class="column-header">
                    <i class="fas fa-history"></i>
                    <span>ВЫДАНО</span>
                    <span class="badge" id="doneCount">0</span>
                </div>
                <div class="numbers-grid" id="doneNumbers"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlZ5ZtyTXgtXxSXJAx1jOxwhTrzlHRJmo",
            authDomain: "bk-cashier.firebaseapp.com",
            databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bk-cashier",
            storageBucket: "bk-cashier.firebasestorage.app",
            messagingSenderId: "385000840969",
            appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let orders = {
            waiting: {},
            ready: {},
            done: {}
        };

        // ========== ЖИВЫЕ ЧАСЫ ==========
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU');
            document.getElementById('liveTime').innerText = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // ========== ФОРМАТИРОВАНИЕ ВРЕМЕНИ ==========
        function getTimeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            
            if (seconds < 60) return `${seconds} сек назад`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)} мин назад`;
            return `${Math.floor(seconds / 3600)} ч назад`;
        }

        // ========== СЛУШАТЕЛЬ ЗАКАЗОВ ==========
        function setupFirebaseListener() {
            // Новые заказы
            db.ref('orders').on('child_added', (snapshot) => {
                const order = snapshot.val();
                const orderNum = snapshot.key;
                
                if (order.status === 'waiting') {
                    orders.waiting[orderNum] = order;
                    showNotification('Новый заказ #' + orderNum);
                } else if (order.status === 'ready') {
                    orders.ready[orderNum] = order;
                } else if (order.status === 'done') {
                    orders.done[orderNum] = order;
                }
                
                updateDisplays();
                if (navigator.vibrate) navigator.vibrate(200);
            });

            // Изменения заказов
            db.ref('orders').on('child_changed', (snapshot) => {
                const order = snapshot.val();
                const orderNum = snapshot.key;
                
                // Удаляем из всех колонок
                delete orders.waiting[orderNum];
                delete orders.ready[orderNum];
                delete orders.done[orderNum];
                
                // Добавляем в нужную
                if (order.status === 'waiting') {
                    orders.waiting[orderNum] = order;
                } else if (order.status === 'ready') {
                    orders.ready[orderNum] = order;
                } else if (order.status === 'done') {
                    orders.done[orderNum] = order;
                    
                    // Ограничим историю последними 20 заказами
                    const doneKeys = Object.keys(orders.done);
                    if (doneKeys.length > 20) {
                        const oldest = doneKeys.sort()[0];
                        delete orders.done[oldest];
                    }
                }
                
                updateDisplays();
            });
        }

        // ========== ОБНОВЛЕНИЕ ЭКРАНОВ ==========
        function updateDisplays() {
            updateColumn('waiting', 'waitingNumbers', 'waitingCount');
            updateColumn('ready', 'readyNumbers', 'readyCount');
            updateColumn('done', 'doneNumbers', 'doneCount');
        }

        function updateColumn(status, elementId, countId) {
            const container = document.getElementById(elementId);
            const ordersList = orders[status];
            const count = Object.keys(ordersList).length;
            
            document.getElementById(countId).innerText = count;
            
            if (count === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas ${status === 'waiting' ? 'fa-clock' : status === 'ready' ? 'fa-check-circle' : 'fa-history'}"></i>
                        <p>Нет заказов</p>
                    </div>
                `;
                return;
            }

            let html = '';
            
            // Сортируем по времени (новые сверху)
            const sortedOrders = Object.entries(ordersList).sort((a, b) => {
                return b[1].createdAt - a[1].createdAt;
            });

            sortedOrders.forEach(([num, order]) => {
                const crownBonus = Math.floor(order.total / 100);
                const timeAgo = getTimeAgo(order.createdAt);
                const isNew = Date.now() - order.createdAt < 30000; // новые 30 секунд
                
                let statusClass = '';
                if (status === 'waiting') statusClass = 'waiting';
                else if (status === 'ready') statusClass = 'ready';
                else statusClass = 'done';
                
                // Для больших номеров на маленьких экранах
                const extraClass = count < 5 ? 'big' : '';
                
                html += `
                    <div class="number-card ${statusClass} ${extraClass} ${isNew ? 'new' : ''}">
                        <div class="crowns">
                            <i class="fas fa-crown"></i> ${crownBonus}
                        </div>
                        <div class="order-number">#${num}</div>
                        <div class="client-name">
                            <i class="fas fa-user"></i> ${order.userName || 'Клиент'}
                        </div>
                        <div class="time-ago">
                            <i class="fas fa-clock"></i> ${timeAgo}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotification(text) {
            // Создаём временное уведомление
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #4CAF50;
                color: white;
                padding: 15px 25px;
                border-radius: 60px;
                font-weight: 700;
                z-index: 1000;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                animation: slideIn 0.3s;
            `;
            notification.innerHTML = `🔔 ${text}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // ========== ЗАПУСК ==========
        setupFirebaseListener();

        // Очистка старых заказов из done каждые 5 минут
        setInterval(() => {
            const oneHourAgo = Date.now() - 3600000;
            Object.entries(orders.done).forEach(([num, order]) => {
                if (order.createdAt < oneHourAgo) {
                    delete orders.done[num];
                }
            });
            updateDisplays();
        }, 300000);
    </script>
</body>
</html>
